# docker compose up
#
# Brings up the WhatsApp AI Triage dashboard in DEMO MODE. No Supabase, no n8n,
# no auth — everything is served from in-memory fixtures, and a simulated
# realtime feed drips new inbound messages every ~12 seconds so the live badge
# isn't lying.
#
# Open http://localhost:3000 once the container is healthy.
#
# For REAL mode, copy .env.example to .env, fill in the Supabase + n8n values,
# set DEMO_MODE=false / NEXT_PUBLIC_DEMO_MODE=false, then run:
#   docker compose --env-file .env up

services:
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        DEMO_MODE: ${DEMO_MODE:-true}
        NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-true}
        NEXT_PUBLIC_ENV_LABEL: ${NEXT_PUBLIC_ENV_LABEL:-Demo}
    image: whatsapp-ai-triage-dashboard:latest
    container_name: triage-dashboard
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      # Mirror build-time values so they're available at runtime too. (The
      # NEXT_PUBLIC_* values are inlined into the build; the unprefixed ones
      # are read on each request.)
      DEMO_MODE: ${DEMO_MODE:-true}
      NEXT_PUBLIC_DEMO_MODE: ${NEXT_PUBLIC_DEMO_MODE:-true}
      NEXT_PUBLIC_ENV_LABEL: ${NEXT_PUBLIC_ENV_LABEL:-Demo}
      # Real-mode values. Ignored in demo. Defaults to empty strings so the
      # env loader's `if (!process.env.X)` checks behave correctly.
      SUPABASE_URL: ${SUPABASE_URL:-}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-}
      NEXT_PUBLIC_SUPABASE_URL: ${NEXT_PUBLIC_SUPABASE_URL:-}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${NEXT_PUBLIC_SUPABASE_ANON_KEY:-}
      N8N_OUTBOUND_WEBHOOK_URL: ${N8N_OUTBOUND_WEBHOOK_URL:-}
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
